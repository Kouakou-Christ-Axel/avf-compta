name: Release

on:
  push:
    tags:
      - "v*"

# Nécessaire pour créer la GitHub Release et y déposer les bundles.
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.msi + .exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installation des dépendances JS
        run: pnpm install --frozen-lockfile

      - name: Synchronise la version depuis le tag
        # set-version.mjs retire lui-même le préfixe « v » ; pas d'expansion
        # shell (cross-plateforme : le runner Windows utilise PowerShell).
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      - name: Build + publication de la release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Signature des mises à jour (plugin updater). Secrets à définir dans
          # le dépôt ; sans eux, le build échoue car createUpdaterArtifacts=true.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "avf-compta ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          args: --bundles msi,nsis
